<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roebi-ai.ch</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-glow: #00ff4166;
      --amber: #ffb300;
      --cyan: #00e5ff;
      --bg: #030d05;
      --scanline: rgba(0,255,65,0.03);
    }
    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--green); font-family: 'Share Tech Mono', monospace; overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
      pointer-events: none; z-index: 100;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
      pointer-events: none; z-index: 99;
    }
    .screen { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .header { position: absolute; top: 2rem; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 2.5rem; opacity: 0; animation: fadeIn 0.5s ease forwards 0.3s; }
    .logo { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.4rem; color: var(--green); text-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-glow); letter-spacing: 0.15em; }
    .logo span { color: var(--cyan); }
    .status { font-size: 0.75rem; color: var(--green-dim); letter-spacing: 0.2em; }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 6px; box-shadow: 0 0 8px var(--green); animation: blink 1.2s ease-in-out infinite; }
    .terminal { width: 100%; max-width: 820px; background: rgba(0,10,3,0.95); border: 1px solid var(--green-dim); border-radius: 4px; box-shadow: 0 0 0 1px rgba(0,255,65,0.1), 0 0 40px rgba(0,255,65,0.08), inset 0 0 60px rgba(0,0,0,0.5); opacity: 0; transform: translateY(12px); animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards 0.6s; }
    .terminal-bar { display: flex; align-items: center; gap: 7px; padding: 11px 16px; background: rgba(0,255,65,0.05); border-bottom: 1px solid rgba(0,255,65,0.2); }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; } .dot.y { background: #ffbd2e; } .dot.g { background: #28ca41; }
    .terminal-title { margin-left: auto; margin-right: auto; font-size: 0.78rem; color: rgba(0,255,65,0.6); letter-spacing: 0.12em; transform: translateX(-18px); }
    .terminal-body { padding: 1.2rem 1.6rem 1.4rem; height: 400px; overflow: hidden; font-size: 0.88rem; line-height: 1.75; }
    .line { display: block; white-space: pre; }
    .line.prompt  { color: var(--cyan); }
    .line.border  { color: rgba(0,255,65,0.4); }
    .line.header  { color: var(--amber); }
    .line.value   { color: var(--green); }
    .line.cmd     { color: rgba(0,255,65,0.55); }
    .line.step    { color: var(--green-dim); }
    .line.success { color: #28ca41; }
    .line.info    { color: rgba(0,255,65,0.6); }
    .line.done    { color: var(--amber); }
    .line.empty   { min-height: 1.75em; }
    .cursor { display: inline-block; width: 9px; height: 1em; background: var(--green); vertical-align: text-bottom; margin-left: 2px; animation: blink 0.9s step-end infinite; box-shadow: 0 0 8px var(--green); }
    .footer { position: absolute; bottom: 2rem; left: 0; right: 0; display: flex; justify-content: center; gap: 2.5rem; opacity: 0; animation: fadeIn 0.6s ease forwards 1s; }
    .footer a { color: rgba(0,255,65,0.5); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.2s, text-shadow 0.2s; }
    .footer a:hover { color: var(--green); text-shadow: 0 0 12px var(--green-glow); }
    .footer a::before { content: '> '; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <div class="logo">roebi<span>-ai.ch</span></div>
      <div class="status"><span class="status-dot"></span>SYSTEM ONLINE</div>
    </div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        <div class="terminal-title">create-skill pipeline — roebi/agent-skills</div>
      </div>
      <div class="terminal-body" id="output"></div>
    </div>
    <div class="footer">
      <a href="https://roebi.github.io/roebi-portfolio-github/">Portfolio</a>
      <a href="https://roebi.github.io/roebi-halter-in-blog/">Blog</a>
      <a href="https://github.com/roebi">GitHub</a>
    </div>
  </div>
  <script>
    const lines = [
      { text: '$ podman run --rm \\', cls: 'prompt' },
      { text: '    -e SKILL_NAME=fortune-cowsay \\', cls: 'cmd' },
      { text: '    -e MODEL=openai/gpt-4o \\', cls: 'cmd' },
      { text: '    -e FEATURE_BRANCH=feature/issue-1-fortune-cowsay \\', cls: 'cmd' },
      { text: '    create-skill:latest', cls: 'cmd' },
      { text: '', cls: 'empty' },
      { text: '========================================================', cls: 'border' },
      { text: ' create-skill pipeline', cls: 'header' },
      { text: '========================================================', cls: 'border' },
      { text: ' Skill name    : fortune-cowsay', cls: 'value' },
      { text: ' Feature branch: feature/issue-1-fortune-cowsay', cls: 'value' },
      { text: ' Target repo   : https://github.com/roebi/agent-skills.git', cls: 'value' },
      { text: ' Model (raw)   : openai/gpt-4o', cls: 'value' },
      { text: ' Creator skill : agent-skills/skills/create-agent-skill/SKILL.md', cls: 'value' },
      { text: '========================================================', cls: 'border' },
      { text: '', cls: 'empty' },
      { text: '[1/7] Cloning target repo ...', cls: 'step' },
      { text: '      Cloned https://github.com/roebi/agent-skills.git  ✓', cls: 'success' },
      { text: '[2/7] Creating feature branch ...', cls: 'step' },
      { text: '      Switched to feature/issue-1-fortune-cowsay  ✓', cls: 'success' },
      { text: '[3/7] Fetching creator skill from GitHub ...', cls: 'step' },
      { text: '      Fetched create-agent-skill/SKILL.md  ✓', cls: 'success' },
      { text: '[4/7] Building aider-skills XML context ...', cls: 'step' },
      { text: '      Indexed 3 skills from ./skills/  ✓', cls: 'success' },
      { text: '[5/7] Running aider with gpt-4o ...', cls: 'step' },
      { text: '      Aider v0.82.0  model: openai/gpt-4o', cls: 'info' },
      { text: '      Generating fortune-cowsay/SKILL.md ...', cls: 'info' },
      { text: '      fortune-cowsay/SKILL.md  created  ✓', cls: 'success' },
      { text: '[6/7] Validating generated skill ...', cls: 'step' },
      { text: '      aider-skills validate fortune-cowsay  ✓', cls: 'success' },
      { text: '[7/7] Committing and pushing feature branch ...', cls: 'step' },
      { text: '      git push origin feature/issue-1-fortune-cowsay  ✓', cls: 'success' },
      { text: '      gh pr create -> PR #2 opened  ✓', cls: 'success' },
      { text: '', cls: 'empty' },
      { text: ' Skill fortune-cowsay created. PR #2 ready for review.', cls: 'done' },
    ];

    const output = document.getElementById('output');
    let i = 0;

    function nextLine() {
      if (i >= lines.length) {
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        output.appendChild(cursor);
        setTimeout(() => { output.innerHTML = ''; i = 0; setTimeout(nextLine, 600); }, 5000);
        return;
      }
      const { text, cls } = lines[i];
      const el = document.createElement('span');
      el.className = 'line ' + cls;
      output.appendChild(el);
      output.scrollTop = output.scrollHeight;
      if (cls === 'empty') { i++; setTimeout(nextLine, 80); return; }
      let charIdx = 0;
      const speed = cls === 'cmd' ? 14 : cls === 'border' ? 4 : 18;
      function typeChar() {
        if (charIdx < text.length) {
          el.textContent += text[charIdx++];
          output.scrollTop = output.scrollHeight;
          setTimeout(typeChar, speed + Math.random() * 8);
        } else {
          el.textContent += '\n';
          i++;
          const pause = cls === 'step' ? 280 : cls === 'border' ? 30 : 55;
          setTimeout(nextLine, pause);
        }
      }
      typeChar();
    }
    setTimeout(nextLine, 1200);
  </script>
</body>
</html>
